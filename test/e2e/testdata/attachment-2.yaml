---
apiVersion: galactic.datumapis.com/v1alpha
kind: VPCAttachment
metadata:
  name: attachment-2
spec:
  vpc:
    apiVersion: galactic.datumapis.com/v1alpha
    kind: VPC
    name: main
    namespace: galactic-e2e-test
  interface:
    name: net0
    addresses:
      - 10.1.1.2/24
      - 2001:10:1:1::2/64
  routes:
    - destination: 192.168.1.0/24
      via: 10.1.1.1
    - destination: 2001:1::/64
      via: 2001:10:1:1::1
    - destination: 192.168.2.0/24
      via: 10.1.1.3
    - destination: 2001:2::/64
      via: 2001:10:1:1::3

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: attachment-2
  labels:
    app.kubernetes.io/name: attachment-2
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: attachment-2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: attachment-2
      annotations:
        k8s.v1alpha.galactic.datumapis.com/vpc-attachment: attachment-2
    spec:
      containers:
      - name: main-container
        image: alpine
        command: ["/bin/ash", "-c", "trap : TERM INT; sleep infinity & wait"]
        securityContext:
          capabilities:
            add:
              - NET_ADMIN
